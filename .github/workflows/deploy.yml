name: Deploy Portfolio

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  NODE_ENV: production
  BASE_URL: ${{ vars.SITE_URL }}
  CNAME_DOMAIN: ${{ vars.CNAME_DOMAIN }}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Wait for additional commits
      run: sleep 120

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install experience graph dependencies
      run: |
        pip install -r experience-graph/requirements.txt

    - name: Generate experience graph
      run: |
        python experience-graph/build_graph.py

    - name: Setup GitHub Pages
      uses: actions/configure-pages@v5

    - name: Install build system dependencies
      run: |
        cd build-system
        npm ci --omit=dev --no-audit

    - name: Validate projects
      run: |
        cd build-system
        npm run validate
      continue-on-error: true

    - name: Build portfolio with automated system
      run: |
        node .github/scripts/build-production.js

    - name: Upload GitHub Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./_site

    - name: Upload build artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: portfolio-build
        path: |
          _site/
          seo-report.json
          projets/validation-report.json
        retention-days: 30

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4