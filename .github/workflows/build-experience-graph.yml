name: Build Experience Graph

on:
  push:
    branches:
      - main
    paths:
      - "experience-graph/data.json"
      - "experience-graph/build_graph.py"
      - "experience-graph/requirements.txt"
      - ".github/workflows/build-experience-graph.yml"

permissions:
  contents: write

jobs:
  build-experience-graph:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r experience-graph/requirements.txt

      - name: Generate experience graph
        run: python experience-graph/build_graph.py

      - name: Commit generated HTML if changed
        run: |
          if git diff --quiet -- experience-graph/index.html; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add experience-graph/index.html
          git commit -m "chore: rebuild experience graph"
          git push

